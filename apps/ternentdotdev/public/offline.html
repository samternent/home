<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Clash Grotesk", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e2a47, #090e19 65%);
        color: #e8ecfa;
      }
      main {
        max-width: 36rem;
        padding: 2rem;
        border: 1px solid rgba(122, 146, 217, 0.35);
        border-radius: 1rem;
        background: rgba(8, 14, 25, 0.88);
      }
      h1 { margin-top: 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>The app shell is cached. Reconnect to sync data and continue where you left off.</p>
    </main>
  </body>
</html>
