  host: concord.ternent.dev
  themeName: concord
  defaultThemeMode: dark

seo:
  shortName: Concord
  description: Concord is a runtime for building applications from signed, optionally encrypted, append-only history.
  lang: en

landing:
  navigationLinks:
    - href: "#proof-model"
      label: The Runtime
    - href: "#proof-json"
      label: Ledger Artifact
    - href: "#surfaces"
      label: Surfaces
    - href: "#static-build"
      label: Example Use
    - href: "#developers"
      label: Developers

  hero:
    eyebrow: concord
    title: Build apps on signed history.
    description: Concord is a runtime for building applications where state is derived from signed, append-only history. You dispatch commands. You commit deliberately. Sensitive payloads can be encrypted. State is rebuilt through replay.
    supportingLine: Write intent. Commit it. Replay into state.
    note: Storage persists. History defines. Concord keeps that boundary clear.
    primaryAction:
      href: https://www.npmjs.com/package/@ternent/concord
      label: Install package
      variant: primary
    secondaryAction:
      href: https://github.com/samternent/home/tree/main/packages/concord
      label: View source
      variant: secondary
    preview:
      title: Concord runtime
      meta: command → signed history → replay
      statusLabel: Deterministic
      statusTone: neutral
      rows:
        - label: Writes
          value: staged first
          valueTone: primary
        - label: Commit
          value: signed + linked
          valueTone: secondary
        - label: Payloads
          value: optional encryption
          valueTone: accent
        - label: Result
          value: derived state
          valueTone: success
      footerText: Concord stages commands, commits them into signed parent-linked history, supports encrypted payloads when needed, and rebuilds application state from replay instead of treating storage as authority.

  proofModelSection:
    eyebrow: Runtime Model
    title: How Concord turns history into state
    description: Commands produce entries. Commits make them durable. Replay rebuilds application state from ordered history. If committed history is modified, verification fails. If it can be replayed and verified, it can be trusted.
    items:
      - title: Command-first ergonomics
        description: Work with domain commands like "todo.create-item" instead of constructing low-level entries yourself.
      - title: Explicit commit boundaries
        description: Decide when staged work becomes permanent. Commits bind ordered entries into a signed chain.
      - title: Optional encrypted payloads
        description: Protect sensitive data before it enters history. Encryption remains explicit and portable.
      - title: Deterministic replay
        description: State is rebuilt from ordered history through replay plugins. No hidden mutation. No silent drift.

  proofJsonSection:
    eyebrow: Portable History
    title: A signed artifact you can inspect and validate
    description: "This artifact is exported from the live Concord runtime above. Change a commit. Break a parent link. Edit a payload. Verification fails immediately. This is the full, portable application history."
    code: |-
      {
        "format": "concord-ledger",
        "version": "1",
        ...
      }
    supportingText: "Concord will not derive runtime state from corrupted or unverified history."

  suiteSection:
    eyebrow: The Suite
    title: Concord is part of a focused stack.
    description: Concord is the runtime layer in a composable suite. Beneath it are tools for append-only history, portable proof, and encryption. Most applications only need Concord. The rest is there when you do.
    supportingText: Build at the runtime layer. Drop down when you need deeper control.
    items:
      - title: Seal
        description: Produce portable cryptographic proofs for entries, commits, and exported artifacts.
        themeColor: "#2f81f7"
        link:
          href: https://seal.ternent.dev
          label: Explore Seal
      - title: Armour
        description: Encrypt payloads with explicit identity or passphrase contracts before they enter history.
        themeColor: "#14b8a6"
        link:
          href: https://armour.ternent.dev
          label: Explore Armour
      - title: Ledger
        description: Stage, commit, replay, export, and verify append-only signed history.
        themeColor: "#c46a6a"
        link:
          href: https://ledger.ternent.dev
          label: Explore Ledger

  staticBuildSection:
    eyebrow: Example
    title: Build without giving storage authority
    description: Create a Concord app, load or create its history, dispatch commands, commit authored changes, optionally encrypt payloads, and replay entries into isolated plugins.
    steps:
      - title: Create an app runtime
        description: Combine identity, storage, and replay plugins into a Concord app.
      - title: Dispatch commands
        description: Express intent through domain commands. Concord stages structured entries.
      - title: Commit authored history
        description: Group staged entries into a signed, parent-linked commit with meaningful metadata.
      - title: Replay into state
        description: Replay plugins rebuild deterministic state or local projections.
      - title: Verify integrity
        description: If committed history is altered, verification fails clearly and precisely.
    closingLine: History is signed. Payloads can be encrypted. State is derived. Storage is replaceable.
    primaryAction:
      href: https://www.npmjs.com/package/@ternent/concord
      label: Install package
      variant: primary

  developerSection:
    eyebrow: Developers
    title: A small runtime layer for signed applications
    description: Concord handles command routing, commit control, encryption boundaries, replay orchestration, and integrity enforcement without turning into a framework.
    surfaces:
      - Command runtime
      - Explicit commit boundaries
      - Replay plugins
    tabs:
      - value: js
        label: JavaScript
        title: Create a Concord app
        meta: JavaScript
        code: |-
          import { createConcordApp } from "@ternent/concord"
          import { createTodoPlugin } from "@ternent/concord-plugin-todo"

          const app = await createConcordApp({
            identity,
            storage,
            plugins: [createTodoPlugin()],
          })

          await app.load()

          await app.command("todo.create-item", {
            id: crypto.randomUUID(),
            title: "Buy milk",
          })

          await app.commit({
            metadata: {
              message: "Create first todo",
            },
          })

          const verification = await app.verify()
          const todoState = app.getReplayState("todo")
        supportingCopy: Dispatch commands. Commit deliberately. Replay signed history into state.
        link:
          href: https://github.com/samternent/home/tree/main/packages/concord
          label: View source

  ctaSection:
    eyebrow: Ready
    title: Build apps on signed history.
    description: Use Concord for command ergonomics and replay-driven state, with optional encryption for sensitive data.
    primaryAction:
      href: https://www.npmjs.com/package/@ternent/concord
      label: Install package
      variant: primary
    secondaryAction:
      href: https://github.com/samternent/home/tree/main/packages/concord
      label: View source
      variant: secondary

