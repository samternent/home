  suiteSection:
    eyebrow: The Suite
    title: Concord sits inside a composable stack.
    description: Concord gives applications the runtime layer. The rest of the suite keeps authenticity, confidentiality, and replayable truth explicit instead of hiding them behind storage or framework magic.
    supportingText: Reach for Concord when you need command dispatch, commit control, replay, and plugin state. Pair it with Seal, Armour, and Ledger when the same app also needs portable proofs, protected payloads, and append-only verifiable history.
    items:
      - title: Seal
        description: Produce portable proofs for entries, commits, and exported artifacts so authenticity travels with the data.
        themeColor: "#2f81f7"
        link:
          href: https://seal.ternent.dev
          label: Explore Seal
      - title: Armour
        description: Protect sensitive payloads with explicit identity and passphrase encryption before they enter signed history.
        themeColor: "#14b8a6"
        link:
          href: https://armour.ternent.dev
          label: Explore Armour
      - title: Ledger
        description: Preserve staged and committed truth as append-only history that can be replayed, exported, imported, and verified.
        themeColor: "#c46a6a"
        link:
          href: https://ledger.ternent.dev
          label: Explore Ledger

  staticBuildSection:
    eyebrow: Example Use
    title: Build an app without owning user data
    description: Create a Concord app, load or create its ledger, dispatch commands, commit authored history, and rebuild plugin state from replay. You can optionally project the same replay stream into fast local query stores.
    steps:
      - title: Create an app runtime
        description: Combine identity, storage, plugins, and optional projection targets into a Concord app.
      - title: Dispatch commands
        description: Express user intent through domain commands. Concord turns them into staged ledger entries.
      - title: Commit authored history
        description: Group staged entries into a signed, parent-linked commit with meaningful metadata.
      - title: Replay into state
        description: Concord rebuilds plugin state deterministically from ordered commit history.
      - title: Verify integrity
        description: Run verification at any time. If history has been altered, Concord fails loudly and precisely.
    closingLine: Storage is replaceable. History is signed. State is derived. Concord keeps those boundaries clean.
    primaryAction:
      href: https://www.npmjs.com/package/@ternent/concord
      label: Install package
      variant: primary

  developerSection:
    eyebrow: For Developers
    title: A runtime you can actually build on
    description: Concord is the developer-facing runtime above Ledger. It handles command routing, commit control, replay orchestration, and projection fanout without becoming a framework or hiding your domain logic.
    surfaces:
      - Command runtime
      - Explicit commit boundaries
      - Projection targets
    tabs:
      - value: js
        label: JavaScript
        title: Create a Concord app
        meta: JavaScript
        code: |-
          import { createConcordApp } from "@ternent/concord"
          import { createTodoPlugin } from "@ternent/concord-plugin-todo"

          const app = await createConcordApp({
            identity,
            storage,
            plugins: [createTodoPlugin()],
          })

          await app.load()

          await app.command("todo.create-item", {
            id: crypto.randomUUID(),
            title: "Buy milk",
          })

          await app.command("todo.rename-item", {
            id: "todo_123",
            title: "Buy oat milk",
          })

          await app.commit({
            metadata: {
              message: "Create and refine first todo",
            },
          })

          const verification = await app.verify()
          const todoState = app.getPluginState("todo")
        supportingCopy: You dispatch commands. You decide when to commit. Concord rebuilds state from replay and enforces integrity across the entire history.
        link:
          href: https://github.com/samternent/home/tree/main/packages/concord
          label: View source
      - value: cli
        label: Ledger + Seal
        title: Build on Ledger instead of replacing it
        meta: Ledger integration
        code: |-
          const app = await createConcordApp({
            identity,
            storage,
            plugins,
            protocol,
            seal,
            armour,
          })

          await app.load()

          await app.command("journal.create-entry", {
            text: "private note"
          })

          await app.commit({
            metadata: {
              message: "Commit private note"
            }
          })

          const verification = await app.verify()
          const ledger = await app.exportLedger()
        supportingCopy: Concord does not invent a new truth model. It builds on Ledger’s signed commit history and strict verification semantics.
        link:
          href: https://ledger.ternent.dev
          label: Explore Ledger
      - value: action
        label: Projection targets
        title: Fan replay into local query stores
        meta: projection target
        code: |-
          const app = await createConcordApp({
            identity,
            storage,
            plugins: [createTodoPlugin()],
            projectionTargets: [loki.target],
          })

          await app.load()

          await app.command("todo.create-item", {
            id: "todo_123",
            title: "Buy milk",
          })

          await app.commit({
            metadata: {
              message: "Commit todo projection"
            }
          })

          const rows = loki.getCollection("concord/all")?.find() ?? []
        supportingCopy: Projection targets consume the same replay stream that builds plugin state. They are fast derived views, never authority.
        link:
          href: https://seal.ternent.dev
          label: Explore Seal

