name: Release proof

on:
  push:
    branches:
      - main
    paths:
      - apps/proof/package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-proof
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Read proof version
        id: proof
        run: |
          version="$(node -p "require('./apps/proof/package.json').version")"
          tag="proof-${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: release
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.proof.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "${{ steps.proof.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.proof.outputs.tag }}" \
            --generate-notes
