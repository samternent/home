name: Release beta.pixpax.xyz
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PIXPAX_PROJECT_ID }}
  PNPM_CACHE_PATH: ~/.pnpm-store
  PNPM_CACHE_NAME: pnpm-store-cache
  SEAL_IDENTITY: ${{ secrets.SEAL_IDENTITY }}
on:
  push:
    tags:
      - "pixpax-*.*.*"

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@master
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get branch name
        id: branch
        run: |
          echo "branch_name=$(echo ${GITHUB_REF#refs/heads/} | tr / -)" >> $GITHUB_ENV

      - name: Get node version
        id: nvmrc
        run: echo ::set-output name=NODE_VERSION::$(cat .nvmrc)

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Vercel CLI
        run: pnpm install --global vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pixpax app
        run: pnpm --filter ternent-ui --filter ternent-utils --filter @ternent/identity --filter @ternent/rage --filter @ternent/armour --filter @ternent/seal-cli --filter pixpax build

      - name: Link Vercel project
        run: vercel link --yes --cwd ${{ github.workspace }}/apps/pixpax --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --cwd ${{ github.workspace }}/apps/pixpax --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel Environment Information
        run: vercel build --prod --cwd ${{ github.workspace }}/apps/pixpax --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate sealed site artifacts
        uses: samternent/seal-action@v2
        with:
          assets-directory: apps/pixpax/.vercel/output/static

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --cwd ${{ github.workspace }}/apps/pixpax --token=${{ secrets.VERCEL_TOKEN }}
